---
- name: Ensure unzip is installed
  package:
    name: unzip
    state: present

- name: Download AWS CLI v2 installer ZIP
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip
    mode: '0644'
    force: yes

- name: Unarchive AWS CLI v2 installer
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: yes

- name: Install AWS CLI v2
  command: /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Verify AWS CLI is installed
  command: aws --version
  register: awscli_version
  changed_when: false

- name: Display AWS CLI version
  debug:
    var: awscli_version.stdout

- name: Clean up AWS CLI installer archive
  file:
    path: /tmp/awscliv2.zip
    state: absent

- name: Clean up AWS CLI installer directory
  file:
    path: /tmp/aws
    state: absent
